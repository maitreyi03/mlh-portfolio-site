<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta property="og:title" content="Personal Portfolio">
    <meta property="og:description" content="My Personal Portfolio">
    <meta property="og:url" content="{{ url }}">

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='img/favicon.ico') }}" type="image/x-icon" />
    <title>{{ title }}</title>
    {% block head %}{% endblock %}
</head>

<body>
    <header class="nav-bar">
        <div class="nav-content">
            <a class="nav-logo" href="{{ url_for('index') }}">
                <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="Logo" />
            </a>
            <nav class="nav-links">
                {% for page in pages %}
                <a href="{{ url_for(page.endpoint) }}"
                    class="nav-link {% if request.endpoint == page.endpoint %}active{% endif %}">{{ page.name }}</a>
                {% endfor %}
            </nav>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>© {{ year }} {{ name }} · Built with Flask for the MLH Fellowship</p>
    </footer>

    {% block scripts %}{% endblock %}
</body>

</html>
