{% extends "base.html" %}

{% block content %}
<div class="container">
    {% for section in hobbies %}
    <section class="section">
        <h2>{{ section.section }}</h2>
        <div class="hobby-grid">
            {% for hobby in section.hobbies %}
            <div class="hobby-card">
                {% if hobby.image %}
                <img src="{{ url_for('static', filename='img/' + hobby.image) }}" alt="{{ hobby.name }}">
                {% else %}
                <div class="hobby-icon">{{ hobby.icon }}</div>
                {% endif %}
                <h3>{{ hobby.name }}</h3>
                <p>{{ hobby.description }}</p>
            </div>
            {% endfor %}
        </div>
    </section>
    {% endfor %}
</div>
{% endblock %}
