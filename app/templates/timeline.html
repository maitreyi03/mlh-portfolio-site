{% extends "base.html" %}

{% block content %}
<div class="timeline-page">
    <header class="timeline-header">
        <div class="section-label">
            <span class="kicker">Wire Dispatches</span>
            <span class="kicker-rule"></span>
        </div>
        <h1 class="section-heading">Dispatches</h1>

        <p>
            Live updates from the school, career, and software
            engineering beat &mdash; filed as they happen.
        </p>
    </header>

    <section class="timeline-form-card">
        <h2>File a Dispatch</h2>

        <form id="timeline-form" class="timeline-form">
            <div class="form-row">
                <div class="form-field">
                    <label for="name">Name</label>

                    <input
                        id="name"
                        name="name"
                        type="text"
                        required
                    >
                </div>

                <div class="form-field">
                    <label for="email">Email</label>

                    <input
                        id="email"
                        name="email"
                        type="email"
                        required
                    >
                </div>
            </div>

            <div class="form-field">
                <label for="content">Dispatch</label>

                <textarea
                    id="content"
                    name="content"
                    placeholder="Share an update..."
                    required
                ></textarea>
            </div>

            <p id="form-status" role="status"></p>

            <button id="submit-button" type="submit">
                Publish Dispatch
            </button>
        </form>
    </section>

    <section>
        <h2>Latest Dispatches</h2>

        <div id="timeline-posts" class="timeline-list">
            <div class="timeline-message">
                Loading timeline posts...
            </div>
        </div>
    </section>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}

<script>
    const timelineEndpoint = "/api/timeline_post";

    const timelineForm = document.querySelector("#timeline-form");
    const timelinePosts = document.querySelector("#timeline-posts");
    const formStatus = document.querySelector("#form-status");
    const submitButton = document.querySelector("#submit-button");

    function createTimelinePost(post) {
        const article = document.createElement("article");
        article.className = "timeline-post";

        const header = document.createElement("div");
        header.className = "timeline-post-header";

        const identity = document.createElement("div");

        const name = document.createElement("h3");
        name.textContent = post.name || "Anonymous";

        const email = document.createElement("div");
        email.className = "timeline-email";
        email.textContent = post.email || "";

        identity.append(name, email);

        const date = document.createElement("time");
        date.className = "timeline-date";
        date.textContent = post.created_at || "";

        const content = document.createElement("p");
        content.className = "timeline-content";
        content.textContent = post.content || "";

        header.append(identity, date);
        article.append(header, content);

        return article;
    }

    function displayTimelinePosts(posts) {
        timelinePosts.replaceChildren();

        if (posts.length === 0) {
            const message = document.createElement("div");
            message.className = "timeline-message";
            message.textContent =
                "There are no timeline posts yet. Add the first one!";

            timelinePosts.append(message);
            return;
        }

        const newestFirst = [...posts].sort(
            (firstPost, secondPost) =>
                Number(secondPost.id) - Number(firstPost.id)
        );

        newestFirst.forEach((post) => {
            timelinePosts.append(createTimelinePost(post));
        });
    }

    async function loadTimelinePosts() {
        try {
            const response = await fetch(timelineEndpoint);

            if (!response.ok) {
                throw new Error(
                    `GET request failed: ${response.status}`
                );
            }

            const data = await response.json();
            const posts = data.timeline_posts || [];

            displayTimelinePosts(posts);
        } catch (error) {
            console.error(error);

            timelinePosts.innerHTML =
                '<div class="timeline-message">' +
                "Timeline posts could not be loaded. " +
                "Check the Flask terminal and database connection." +
                "</div>";
        }
    }

    timelineForm.addEventListener("submit", async (event) => {
        event.preventDefault();

        submitButton.disabled = true;
        formStatus.className = "";
        formStatus.textContent = "Publishing post...";

        try {
            const formData = new FormData(timelineForm);

            const response = await fetch(timelineEndpoint, {
                method: "POST",
                body: formData
            });

            if (!response.ok) {
                throw new Error(
                    `POST request failed: ${response.status}`
                );
            }

            timelineForm.reset();

            formStatus.className = "success";
            formStatus.textContent =
                "Your timeline post was successfully added.";

            await loadTimelinePosts();
        } catch (error) {
            console.error(error);

            formStatus.className = "error";
            formStatus.textContent =
                "The post could not be added. Check the Flask terminal.";
        } finally {
            submitButton.disabled = false;
        }
    });

    loadTimelinePosts();
</script>
{% endblock %}
